services:
  api:
    build: ./api
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ./api:/app
      - /app/node_modules
    environment:
      PORT: ${PORT}
      DB_PATH: /app/db/app.db
      CORS_ORIGIN: http://localhost:${WEB_PORT}

  web:
    build: ./web
    ports:
      - "${WEB_PORT}:${WEB_PORT}"
    volumes:
      - ./web:/app
      - /app/node_modules
    environment:
      VITE_API_PROXY_TARGET: http://api:${PORT}
    depends_on:
      - api
